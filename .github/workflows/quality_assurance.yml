name: QManager Quality Assurance

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  logic-validation:
    name: Core & Backend Logic Verification
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Go Environment
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'
        cache: true

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libvirt-dev pkg-config qemu-system-x86 qemu-utils

    - name: Verify Go Modules
      run: go mod tidy

    - name: Run Backend Unit Tests
      run: go test -v ./src/backend/hypervisor/... ./src/backend/filesystem/...

    - name: Run OS Catalog & Resolver Unit Tests
      run: go test -v -short ./src/backend/discovery/...

    - name: Run Core Logic Tests
      run: go test -v ./src/core/...

  media-integrity:
    name: OS Catalog Media Integrity
    runs-on: ubuntu-latest
    needs: logic-validation
    timeout-minutes: 20

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Go Environment
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'
        cache: true

    - name: Run ISO Download Integrity Tests
      # We run these in parallel now, should be much faster.
      run: go test -v -timeout 15m ./src/backend/discovery/tests/

  production-compilation:
    name: Multi-Platform Production Build
    runs-on: ubuntu-latest
    needs: logic-validation

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Go Environment
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'
        cache: true

    - name: Install Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libvirt-dev pkg-config build-essential

    - name: Build CLI Production Artifact
      run: make build-production-cli

    - name: Archive CLI Artifact
      uses: actions/upload-artifact@v4
      with:
        name: qmanager-cli
        path: deploy/cli/qmanager-cli
